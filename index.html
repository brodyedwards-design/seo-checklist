<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corporate Conversions SEO Checklist</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #191919;
      --muted: #6b6b6b;
      --border: #e7e5e4;
      --accent: #111827;
      --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    .hero {
      margin-bottom: 22px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      max-width: 700px;
      font-size: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      margin: 26px 0 24px;
    }

    .progress-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-label {
      font-size: 14px;
      color: var(--muted);
    }

    .progress-track {
      width: 100%;
      height: 12px;
      background: #efefed;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .2s ease;
    }

    .score {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-header {
      width: 100%;
      background: transparent;
      border: 0;
      border-bottom: 1px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      font-size: 18px;
      font-weight: 600;
      text-align: left;
      border-radius: 0;
      box-shadow: none;
      transform: none;
    }

    .section-header:hover {
      box-shadow: none;
      transform: none;
      background: #fafaf9;
    }

    .section.open .section-header {
      border-bottom-color: var(--border);
    }

    .section-body {
      display: none;
      padding: 8px 20px 18px;
    }

    .section.open .section-body {
      display: block;
    }

    .note {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 14px;
    }

    .checklist {
      display: grid;
      gap: 10px;
    }

    label.item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 12px;
      border-radius: 12px;
      transition: background .15s ease;
    }

    label.item:hover {
      background: #fafaf9;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: #111827;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .item-text {
      font-size: 15px;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 14px;
    }

    @media (max-width: 700px) {
      h1 { font-size: 30px; }
      .topbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">Corporate Conversions</div>
      <h1>SEO Checklist</h1>
      <div class="subtitle">
        A clean, client-friendly SEO checklist with live progress tracking. Expand each section, check off completed items, and use the progress bar to track completion.
      </div>
    </div>

    <div class="topbar">
      <div class="progress-meta">
        <div class="progress-label">Overall completion</div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
      <div class="controls">
        <div class="score" id="scoreText">0 / 0 complete</div>
        <button id="expandAll">Expand all</button>
        <button id="collapseAll">Collapse all</button>
        <button id="resetAll">Reset</button>
      </div>
    </div>

    <div id="sections"></div>

    <div class="footer-note">
      Progress is saved in your browser using local storage.
    </div>
  </div>

  <script>
    const data = [
      {
        title: "SEO Foundations",
        note: "Core setup items that should be in place before deeper SEO work begins.",
        items: [
          "Google Search Console connected",
          "GA4 installed and verified",
          "Bing Webmaster Tools set up",
          "XML sitemap submitted",
          "Robots.txt configured",
          "HTTPS enabled",
          "Conversion tracking set up"
        ]
      },
      {
        title: "Keyword Strategy",
        note: "Each page should target one primary keyword and align with search intent.",
        items: [
          "Primary keyword assigned per page",
          "Secondary keywords identified",
          "Search intent validated",
          "Competitor keyword gaps reviewed",
          "Long-tail keywords added",
          "Cannibalization check completed"
        ]
      },
      {
        title: "Site Structure",
        note: "",
        items: [
          "Clean URL structure",
          "Logical hierarchy",
          "Internal linking implemented",
          "No orphan pages",
          "Key pages within three clicks of homepage"
        ]
      },
      {
        title: "Technical SEO",
        note: "Page speed and crawlability should be prioritized.",
        items: [
          "Site is crawlable",
          "Indexing issues resolved",
          "No broken links",
          "Redirects properly implemented",
          "Core Web Vitals optimized",
          "Mobile-friendly",
          "Canonical tags implemented",
          "Schema markup added"
        ]
      },
      {
        title: "On-Page SEO",
        note: "",
        items: [
          "Title tag optimized",
          "Meta description written",
          "H1 includes keyword",
          "Proper header structure",
          "Internal links added",
          "URL slug optimized",
          "Image alt text added",
          "Content matches search intent"
        ]
      },
      {
        title: "Content Quality",
        note: "Depth and usefulness matter more than volume.",
        items: [
          "Content is original",
          "Demonstrates expertise",
          "Includes real examples",
          "Updated recently",
          "Covers topic comprehensively"
        ]
      },
      {
        title: "Off-Page SEO",
        note: "",
        items: [
          "Backlink profile analyzed",
          "High-quality backlinks acquired",
          "Citations consistent",
          "Brand mentions tracked"
        ]
      },
      {
        title: "Local SEO",
        note: "Use this section only when local visibility matters.",
        items: [
          "Google Business Profile optimized",
          "Reviews generated consistently",
          "NAP consistent across listings",
          "Location pages optimized"
        ]
      },
      {
        title: "Tracking and Reporting",
        note: "",
        items: [
          "Conversions tracked",
          "Keyword rankings monitored",
          "Landing page performance reviewed",
          "Monthly reporting in place"
        ]
      },
      {
        title: "Ongoing SEO",
        note: "",
        items: [
          "Content published regularly",
          "Old content refreshed",
          "Technical audits performed",
          "Link building ongoing"
        ]
      }
    ];

    const storageKey = "cc-seo-checklist-v1";
    const openKey = "cc-seo-checklist-open-v1";

    let saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
    let openSaved = JSON.parse(localStorage.getItem(openKey) || "{}");

    const sectionsEl = document.getElementById("sections");
    const progressBar = document.getElementById("progressBar");
    const scoreText = document.getElementById("scoreText");

    function render() {
      sectionsEl.innerHTML = "";

      data.forEach((section, sIndex) => {
        const sectionId = `section-${sIndex}`;
        const isOpen = openSaved[sectionId] ?? (sIndex < 2);

        const sectionEl = document.createElement("div");
        sectionEl.className = `section ${isOpen ? "open" : ""}`;

        const header = document.createElement("button");
        header.className = "section-header";
        header.innerHTML = `<span>${section.title}</span><span>${isOpen ? "−" : "+"}</span>`;
        header.addEventListener("click", () => {
          const nextOpen = !sectionEl.classList.contains("open");
          sectionEl.classList.toggle("open", nextOpen);
          openSaved[sectionId] = nextOpen;
          localStorage.setItem(openKey, JSON.stringify(openSaved));
          header.innerHTML = `<span>${section.title}</span><span>${nextOpen ? "−" : "+"}</span>`;
        });

        const body = document.createElement("div");
        body.className = "section-body";

        if (section.note) {
          const note = document.createElement("p");
          note.className = "note";
          note.textContent = section.note;
          body.appendChild(note);
        }

        const checklist = document.createElement("div");
        checklist.className = "checklist";

        section.items.forEach((item, iIndex) => {
          const itemId = `${sectionId}-item-${iIndex}`;
          const checked = !!saved[itemId];

          const label = document.createElement("label");
          label.className = `item ${checked ? "done" : ""}`;

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = checked;
          checkbox.addEventListener("change", () => {
            saved[itemId] = checkbox.checked;
            localStorage.setItem(storageKey, JSON.stringify(saved));
            label.classList.toggle("done", checkbox.checked);
            updateProgress();
          });

          const text = document.createElement("div");
          text.className = "item-text";
          text.textContent = item;

          label.appendChild(checkbox);
          label.appendChild(text);
          checklist.appendChild(label);
        });

        body.appendChild(checklist);
        sectionEl.appendChild(header);
        sectionEl.appendChild(body);
        sectionsEl.appendChild(sectionEl);
      });

      updateProgress();
    }

    function updateProgress() {
      const total = data.reduce((sum, section) => sum + section.items.length, 0);
      let done = 0;

      data.forEach((section, sIndex) => {
        section.items.forEach((_, iIndex) => {
          const itemId = `section-${sIndex}-item-${iIndex}`;
          if (saved[itemId]) done++;
        });
      });

      const pct = total ? Math.round((done / total) * 100) : 0;
      progressBar.style.width = pct + "%";
      scoreText.textContent = `${done} / ${total} complete`;
    }

    document.getElementById("expandAll").addEventListener("click", () => {
      data.forEach((_, sIndex) => {
        openSaved[`section-${sIndex}`] = true;
      });
      localStorage.setItem(openKey, JSON.stringify(openSaved));
      render();
    });

    document.getElementById("collapseAll").addEventListener("click", () => {
      data.forEach((_, sIndex) => {
        openSaved[`section-${sIndex}`] = false;
      });
      localStorage.setItem(openKey, JSON.stringify(openSaved));
      render();
    });

    document.getElementById("resetAll").addEventListener("click", () => {
      if (!confirm("Reset all checklist progress?")) return;
      localStorage.removeItem(storageKey);
      localStorage.removeItem(openKey);
      saved = {};
      openSaved = {};
      render();
    });

    render();
  </script>
</body>
</html>
